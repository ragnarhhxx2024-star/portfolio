<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投资组合追踪</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #E8DFCB; color: #2A2F25; font-size: 14px; overflow-x: hidden; }
.serif { font-family: 'Noto Serif SC', 'Source Han Serif SC', 'STSong', serif; }
.mono { font-family: 'JetBrains Mono', 'Consolas', 'Courier New', monospace; }
.container { display: flex; min-height: 100vh; max-width: 100vw; overflow: hidden; }

/* Sidebar */
.sidebar { width: 180px; background: #F2EBD7; border-right: 1px solid #CEC2A7; padding: 20px 12px; flex-shrink: 0; }
.sidebar h3 { padding: 0 8px 12px; font-size: 11px; color: #6D6557; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
.nav-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; color: #2A2F25; transition: all .2s; margin-bottom: 2px; display: flex; align-items: center; justify-content: space-between; }
.nav-item:hover { background: #DDD4BF; }
.nav-item.active { background: #2A2F25; color: #F2EBD7; font-weight: 600; }
.nav-item.disabled { color: #B8AB8E; cursor: default; }
.nav-item.disabled:hover { background: transparent; }
.nav-item .tag { font-size: 10px; color: #B8AB8E; text-transform: uppercase; letter-spacing: 0.5px; }
.account-item { padding: 10px 16px; cursor: pointer; border-left: 4px solid transparent; transition: all .2s; border-radius: 0 6px 6px 0; margin: 2px 8px 2px 0; }
.account-item:hover { background: #DDD4BF; }
.account-item.active { border-left-color: #2B5A3C; background: linear-gradient(90deg, #E2E8D5 0%, #ECE8D5 100%); }
.account-item .name { font-weight: 600; font-size: 14px; color: #2A2F25; }
.account-item.active .name { color: #1F4A2F; }
.account-item .info { font-size: 12px; color: #6D6557; margin-top: 3px; }
.account-item .info .gain { color: #2B5A3C; font-weight: 600; }
.account-item .info .loss { color: #9A2D2D; font-weight: 600; }
.account-item.hero { padding: 16px 18px; margin: 2px 8px 10px 8px; border-left: none; border-radius: 6px; background: #2A2F25; color: #F2EBD7; }
.account-item.hero:hover { background: #2A2F25; }
.account-item.hero.active { background: #2A2F25; border-left: none; }
.account-item.hero .name { font-family: 'Noto Serif SC', 'Source Han Serif SC', serif; font-size: 22px; font-weight: 700; letter-spacing: 0.5px; color: #F2EBD7; }
.account-item.hero.active .name { color: #F2EBD7; }
.account-item.hero .info { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 16px; font-weight: 700; color: #F2EBD7; margin-top: 6px; }
.account-item.hero .info .gain { color: #9DC4A3; font-size: 14px; }
.account-item.hero .info .loss { color: #D59E9E; font-size: 14px; }
.add-account-btn { margin: 12px 16px; padding: 8px; border: 1px dashed #B8AB8E; border-radius: 6px; text-align: center; cursor: pointer; color: #6D6557; font-size: 13px; }
.add-account-btn:hover { border-color: #2B5A3C; color: #2B5A3C; }

/* Horizontal Account Tabs (top of main content) */
.account-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.account-tab { padding: 16px 18px; background: #F2EBD7; border-radius: 6px; cursor: pointer; border: 1px solid #D4C9B3; transition: all .2s; min-width: 140px; }
.account-tab:hover { background: #DDD4BF; }
.account-tab.active { border-color: #2A2F25; background: #2A2F25; color: #F2EBD7; }
.account-tab.active .info { color: #D4C9B3; }
.account-tab .name { font-weight: 600; font-size: 14px; color: #2A2F25; }
.account-tab.active .name { color: #F2EBD7; }
.account-tab .info { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 13px; font-weight: 600; color: #6D6557; margin-top: 5px; }
.account-tab .info .gain { color: #1F4A2F; font-weight: 700; }
.account-tab .info .loss { color: #7A1F1F; font-weight: 700; }
.account-tab.active .info .gain { color: #9DC4A3; }
.account-tab.active .info .loss { color: #D59E9E; }
.account-tab .name .pct { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 11px; font-weight: 600; margin-left: 4px; letter-spacing: 0; }
.account-tab .name .pct.gain { color: #1F4A2F; }
.account-tab .name .pct.loss { color: #7A1F1F; }
.account-tab.active .name .pct.gain { color: #9DC4A3; }
.account-tab.active .name .pct.loss { color: #D59E9E; }
.account-tab.add-tab { min-width: 48px; padding: 16px 14px; border: 2px dashed #B8AB8E; color: #6D6557; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 300; }
.account-tab.add-tab:hover { border-color: #2B5A3C; color: #2B5A3C; background: #F2EBD7; }

/* Main */
.main { flex: 1; padding: 24px 20px; overflow: hidden; min-width: 0; }
.header { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 20px; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.header-actions .update-time { font-size: 12px; color: #6D6557; margin-right: 8px; }
.header-actions .sync-pill { font-size: 11px; padding: 3px 10px; border-radius: 12px; border: 1px solid currentColor; background: transparent; font-family: 'JetBrains Mono', monospace; margin-right: 8px; user-select: none; }
.header-actions .sync-pill.clickable:hover { background: rgba(0,0,0,0.04); }
.btn { padding: 6px 14px; border: 1px solid #CEC2A7; border-radius: 6px; background: #F2EBD7; cursor: pointer; font-size: 13px; color: #6D6557; display: inline-flex; align-items: center; gap: 4px; transition: all .2s; }
.btn:hover { border-color: #2B5A3C; color: #2B5A3C; }
.btn-primary { background: #2B5A3C; color: #fff; border-color: #2B5A3C; }
.btn-primary:hover { background: #1F4A2F; }
.btn-danger { color: #9A2D2D; }
.btn-danger:hover { border-color: #9A2D2D; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* Summary Cards */
.summary-cards { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
.sub-value { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 13px; font-weight: 600; margin-top: 2px; color: #6D6557; }
.sub-value.inline { margin-top: 0; margin-left: 4px; font-size: 11px; letter-spacing: 0; text-transform: none; }
.sub-value.gain { color: #1F4A2F; }
.sub-value.loss { color: #7A1F1F; }
.card.active .sub-value { color: #D4C9B3; }
.card.active .sub-value.gain { color: #9DC4A3; }
.card.active .sub-value.loss { color: #D59E9E; }
.card { background: #F2EBD7; border-radius: 10px; padding: 10px 14px; transition: background 0.2s, color 0.2s; }
.card.clickable { cursor: pointer; }
.card.clickable:hover:not(.active) { background: #DDD4BF; }
.card { border: 1px solid #D4C9B3; border-radius: 6px !important; }
.card.active { background: #2A2F25; color: #F2EBD7; border-color: #2A2F25; }
.card.active .label { color: rgba(255,255,255,.85); }
.card.active .value { color: #fff; }
.card .label { font-size: 12px; color: #6D6557; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.card .label .icon { font-size: 16px; }
.card .value { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
.card .label { text-transform: uppercase; letter-spacing: 0.8px; font-size: 11px; }
.card .value.gain { color: #2B5A3C; }
.card .value.loss { color: #9A2D2D; }

/* Account Name Display */
.account-header { font-size: 13px; color: #6D6557; margin-bottom: 16px; }

/* Indices Bar */
.indices-top { background: #2A2F25; border-bottom: 1px solid #1A1F15; padding: 10px 20px; }
.indices-top .index-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
.indices-top .index-card .idx-name { color: #D4C9B3; }
.indices-top .index-card .idx-price { color: #F2EBD7; }
.indices-bar { display: flex; gap: 10px; margin-bottom: 0; }
.index-card { flex: 1; background: #F2EBD7; border-radius: 8px; padding: 10px 12px; min-width: 0; }
.index-card .idx-top { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
.index-card .idx-name { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; color: #2A2F25; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.5px; }
.index-card .idx-price { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 15px; font-weight: 700; }
.index-card .idx-periods { display: flex; gap: 4px; flex-wrap: wrap; }
.index-card .idx-tag { font-size: 11px; padding: 2px 5px; border-radius: 4px; white-space: nowrap; line-height: 1.4; }
.idx-tag.up { background: #E2E8D5; color: #1F4A2F; }
.idx-tag.down { background: #F2E3D9; color: #9A2D2D; }
.idx-tag.flat { background: #DDD4BF; color: #6D6557; }

/* Holdings Table */
.table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.table-header h3 { font-size: 15px; font-weight: 600; }
.holdings-table { width: 100%; background: #F2EBD7; border: 1px solid #D4C9B3; border-radius: 6px; overflow-x: auto; overflow-y: visible; }
.holdings-table table { width: 100%; min-width: 1200px; border-collapse: separate; border-spacing: 0; table-layout: fixed; }
.holdings-table th:first-child,
.holdings-table td:first-child { position: -webkit-sticky; position: sticky; left: 0; background: #F2EBD7; z-index: 2; box-shadow: 2px 0 4px rgba(0,0,0,.06); }
.holdings-table thead th:first-child { background: #F2EBD7; z-index: 3; }
.holdings-table tr:hover td:first-child { background: #DDD4BF; }
.holdings-table th { padding: 10px 6px; text-align: left; font-size: 11px; color: #6D6557; font-weight: 600; border-bottom: 1px solid #CEC2A7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; user-select: none; text-transform: uppercase; letter-spacing: 0.6px; }
.holdings-table th.draggable { cursor: grab; }
.holdings-table th.draggable:active { cursor: grabbing; }
.holdings-table th.drag-over { background: #E2E8D5; }
.holdings-table th.dragging { opacity: 0.4; }
.holdings-table td { padding: 8px 6px; font-size: 13px; border-bottom: 1px solid #D4C9B3; overflow: hidden; text-overflow: ellipsis; }
.holdings-table tr:last-child td { border-bottom: none; }
.holdings-table tr:hover { background: #DDD4BF; }
.ticker-cell .ticker { font-family: 'JetBrains Mono', 'Consolas', monospace; font-weight: 600; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; letter-spacing: 0.3px; }
.ticker-cell .ticker .tk-badge { display: inline-block; padding: 6px 0; min-width: 64px; text-align: center; border-radius: 8px; font-weight: 700; letter-spacing: 0.3px; color: #fff; }
.type-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: #D4C9B3; color: #6D6557; }
.gain { color: #2B5A3C; }
.loss { color: #9A2D2D; }
.editable-input { width: 100%; max-width: 100%; padding: 3px 4px; border: 1px solid #CEC2A7; border-radius: 4px; text-align: center; font-size: 12px; outline: none; box-sizing: border-box; }
.editable-input:focus { border-color: #2B5A3C; }
.sector-select { width: 100%; max-width: 100%; padding: 3px 4px; border: 1px solid #CEC2A7; border-radius: 4px; font-size: 12px; outline: none; background: #F2EBD7; box-sizing: border-box; }
.sector-select:focus { border-color: #2B5A3C; }
.adjust-buy { color: #2B5A3C; font-weight: 600; }
.adjust-sell { color: #9A2D2D; font-weight: 600; }
.delete-btn { background: none; border: 1px solid #CEC2A7; border-radius: 4px; cursor: pointer; color: #6D6557; font-size: 13px; padding: 4px 10px; transition: all .2s; }
.delete-btn:hover { color: #9A2D2D; border-color: #9A2D2D; background: #F2E3D9; }

/* Charts */
.charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; margin-top: 24px; margin-bottom: 24px; }
.chart-card { background: #F2EBD7; border: 1px solid #D4C9B3; border-radius: 6px; padding: 20px; }
.chart-card h3 { font-family: 'Noto Serif SC', 'Source Han Serif SC', serif; font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #2A2F25; }
.time-tabs { display: flex; gap: 4px; margin-bottom: 12px; justify-content: flex-end; }
.time-tab { padding: 4px 12px; border-radius: 14px; border: none; background: #DDD4BF; cursor: pointer; font-size: 12px; color: #6D6557; }
.time-tab.active { background: #2A2F25; color: #fff; }

/* Modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.4); z-index: 100; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal { background: #F2EBD7; border-radius: 12px; padding: 24px; width: 440px; max-height: 80vh; overflow-y: auto; }
.modal h3 { margin-bottom: 16px; font-size: 16px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; color: #6D6557; margin-bottom: 4px; }
.form-group input, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #CEC2A7; border-radius: 6px; font-size: 14px; outline: none; }
.form-group input:focus, .form-group select:focus { border-color: #2B5A3C; }
.form-group .hint { font-size: 11px; color: #6D6557; margin-top: 4px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

/* Toast */
.toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; background: #2A2F25; color: #fff; border-radius: 8px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity .3s; }
.toast.show { opacity: 1; }
.toast.error { background: #9A2D2D; }
.toast.success { background: #2B5A3C; }

/* Sync indicator */
.sync-badge { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.sync-badge.synced { background: #2B5A3C; }
.sync-badge.pending { background: #ff9800; }
.sync-badge.error { background: #9A2D2D; }

/* ========== Mobile ≤768px ========== */
@media (max-width: 768px) {
  .container { flex-direction: column; max-width: 100vw; }

  /* Sidebar → top compact "all accounts" summary */
  .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #CEC2A7; padding: 12px 12px 8px; }
  .account-item.hero { padding: 8px 12px; margin-bottom: 0; }
  .account-item.hero .name { font-size: 16px; }
  .account-item.hero .info { font-size: 13px; margin-top: 2px; }

  /* Account tabs → compact row */
  .account-tab { padding: 6px 12px; min-width: auto; }
  .account-tab .info { font-size: 11px; }

  /* Main area */
  .main { padding: 16px 12px; overflow: visible; }

  /* Header wrap */
  .header { flex-wrap: wrap; gap: 8px; }
  .header-actions { flex-wrap: wrap; gap: 6px; }
  .header-actions .update-time { width: 100%; margin: 0; }
  .btn { padding: 5px 10px; font-size: 12px; }

  /* Indices bar → 2x2 grid */
  .indices-bar { flex-wrap: wrap; gap: 6px; }
  .index-card { flex: 1 1 calc(50% - 3px); min-width: calc(50% - 3px); padding: 8px 10px; gap: 8px; }
  .index-card .idx-price { font-size: 13px; }
  .index-card .idx-tag { font-size: 10px; padding: 1px 4px; }

  /* Summary cards → 2 columns */
  .summary-cards { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .card .value { font-size: 17px; }
  #cashInput { width: 80px !important; font-size: 15px !important; }

  /* Table → horizontal scroll with sticky first column */
  .holdings-table { overflow-x: auto !important; overflow-y: visible !important; -webkit-overflow-scrolling: touch; }
  .holdings-table table { table-layout: auto; min-width: 1100px; border-collapse: separate; border-spacing: 0; }
  .holdings-table th:first-child,
  .holdings-table td:first-child { position: -webkit-sticky; position: sticky; left: 0; background: #F2EBD7; z-index: 2; min-width: 100px; box-shadow: 2px 0 4px rgba(0,0,0,.08); }
  .holdings-table thead th:first-child { background: #F2EBD7; z-index: 3; }
  .holdings-table tr:hover td:first-child { background: #DDD4BF; }

  /* Charts → stack vertically */
  .charts-row { grid-template-columns: 1fr; gap: 16px; }

  /* Modal smaller */
  .modal { width: 95vw; padding: 16px; }
}
</style>
</head>
<body>

<!-- Top Market Indices -->
<div class="indices-top">
  <div class="indices-bar" id="indicesBar"></div>
</div>

<div class="container">
  <!-- Sidebar (reserved for future panels) -->
  <div class="sidebar">
    <h3>导航</h3>
    <div class="nav-item active">账户</div>
    <div class="nav-item disabled">分析 <span class="tag">soon</span></div>
    <div class="nav-item disabled">新闻 <span class="tag">soon</span></div>
    <div class="nav-item disabled">笔记 <span class="tag">soon</span></div>
    <div class="nav-item disabled">待办 <span class="tag">soon</span></div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <div class="header">
      <div class="header-actions">
        <span class="update-time" id="updateTime"></span>
        <span class="sync-pill" id="syncPill" onclick="retrySyncNow()" style="display:none"></span>
        <button class="btn" onclick="refreshPrices()">刷新价格</button>
        <button class="btn" onclick="exportExcel()">导出Excel</button>
        <button class="btn" onclick="exportData()">导出JSON</button>
        <button class="btn" onclick="document.getElementById('importFile').click()">导入</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
        <button class="btn btn-sm" onclick="showSettingsModal()" title="设置">设置</button>
      </div>
    </div>

    <!-- Account Tabs -->
    <div class="account-tabs" id="accountTabs"></div>

    <div class="account-header" id="accountHeader"></div>

    <!-- Summary -->
    <div class="summary-cards">
      <div class="card clickable active" id="cardTotalAssets" onclick="setChartMode('total')">
        <div class="label">总资产</div>
        <div class="value" id="totalAssets">$0.00</div>
      </div>
      <div class="card clickable" id="cardMarketValue" onclick="setChartMode('market')">
        <div class="label">持仓市值</div>
        <div class="value" id="totalValue">$0.00</div>
      </div>
      <div class="card">
        <div class="label">持仓盈亏 <span class="sub-value inline" id="totalPLPct">0.00%</span></div>
        <div class="value" id="totalPL">$0.00</div>
      </div>
      <div class="card">
        <div class="label">当日盈亏 <span class="sub-value inline" id="dailyPLPct">--</span></div>
        <div class="value" id="dailyPL">--</div>
      </div>
      <div class="card" id="cashCard">
        <div class="label">现金 <span class="sub-value inline" id="cashPct"></span></div>
        <div style="display:flex;align-items:baseline;font-family:'JetBrains Mono','Consolas',monospace;font-size:20px;font-weight:700;letter-spacing:-0.5px;">
          <span>$</span>
          <input class="editable-input" id="cashInput" type="number" step="0.01" min="0" style="flex:1;min-width:0;font:inherit;letter-spacing:inherit;padding:0;border:none;background:transparent;text-align:left;" onchange="updateCash(this.value)">
        </div>
      </div>
    </div>

    <!-- Charts -->
    <div class="charts-row">
      <div class="chart-card">
        <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:8px;flex-wrap:wrap;">
          <h3 style="margin:0;" id="lineChartTitle">总资产</h3>
          <span id="vsSpxLabel" style="font-size:12px;color:#6D6557;"></span>
        </div>
        <div class="time-tabs">
          <button class="time-tab" onclick="setTimeRange('1m')">1月</button>
          <button class="time-tab" onclick="setTimeRange('3m')">3月</button>
          <button class="time-tab" onclick="setTimeRange('6m')">6月</button>
          <button class="time-tab active" onclick="setTimeRange('1y')">1年</button>
          <button class="time-tab" onclick="setTimeRange('2y')">2年</button>
          <button class="time-tab" onclick="setTimeRange('3y')">3年</button>
          <button class="time-tab" onclick="setTimeRange('5y')">5年</button>
          <button class="time-tab" onclick="setTimeRange('all')">全部</button>
        </div>
        <div style="height: 320px;"><canvas id="lineChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div style="display:flex;align-items:center;gap:4px;margin-bottom:12px;">
          <button class="time-tab active" id="pieTabHolding" onclick="setPieMode('holding')">持仓分布</button>
          <button class="time-tab" id="pieTabSector" onclick="setPieMode('sector')">板块分布</button>
        </div>
        <div style="height: 320px; max-width: 320px; margin: 0 auto;"><canvas id="pieChart"></canvas></div>
      </div>
    </div>

<script>
// ==================== GitHub Config ====================
const GH_CONFIG_KEY = 'portfolio_github_config';

function getGHConfig() {
  try {
    const raw = localStorage.getItem(GH_CONFIG_KEY);
    if (raw) {
      const c = JSON.parse(raw);
      if (c.token) return c;
    }
  } catch(e) {}
  // Auto-config from URL hash: #token=xxx
  const hash = location.hash.slice(1);
  if (hash.startsWith('token=')) {
    const token = decodeURIComponent(hash.split('token=')[1]);
    const config = { owner: 'ragnarhhxx2024-star', repo: 'portfolio', token };
    setGHConfig(config);
    location.hash = '';
    return config;
  }
  return null;
}

function setGHConfig(config) {
  localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(config));
}

// ==================== Data Layer ====================
const STORAGE_KEY = 'portfolio_tracker_data';
const SECTORS = ['软件','半导体','数据中心','AI','云计算','网络安全','电商','社交媒体','金融科技','加密货币','银行','保险','医疗','生物科技','消费','奢侈品','餐饮','工业','能源','新能源','材料','地产','公用事业','通信','汽车','航空航天','ETF'];

function getDefaultData() {
  return {
    accounts: [{
      id: Date.now().toString(),
      name: '默认组合',
      holdings: []
    }],
    activeAccountId: null,
    history: {}
  };
}

function loadLocalData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (!d.history) d.history = {};
      return d;
    }
  } catch(e) {}
  return null;
}

function saveLocalCache(d) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
}

async function loadRemoteData() {
  // Try loading data.json from same origin (GitHub Pages)
  try {
    const res = await fetch('data.json?t=' + Date.now(), { cache: 'no-store' });
    if (res.ok) {
      const d = await res.json();
      if (d.accounts) {
        if (!d.history) d.history = {};
        return d;
      }
    }
  } catch(e) {}
  return null;
}

// ==================== Sync status ====================
let syncStatus = 'idle';
let syncRetryTimer = null;
let syncLastError = null;
let syncLastSyncedAt = null;

function setSyncStatus(status, detail) {
  syncStatus = status;
  syncLastError = detail || null;
  if (status === 'synced') syncLastSyncedAt = new Date();
  renderSyncPill();
}

function renderSyncPill() {
  const el = document.getElementById('syncPill');
  if (!el) return;
  const states = {
    'idle':     { text: '',              color: null,       clickable: false },
    'synced':   { text: '✓ 已同步',       color: '#2B5A3C',  clickable: false },
    'syncing':  { text: '⟳ 同步中…',      color: '#6D6557',  clickable: false },
    'pending':  { text: '● 待同步',       color: '#D4A017',  clickable: true  },
    'failed':   { text: '⚠ 同步失败',     color: '#9A2D2D',  clickable: true  },
    'no-token': { text: '⚠ 未配置 Token', color: '#9A2D2D',  clickable: true  }
  };
  const s = states[syncStatus] || states.idle;
  if (!s.text) { el.style.display = 'none'; return; }
  el.style.display = 'inline-block';
  el.textContent = s.text;
  el.style.color = s.color;
  el.classList.toggle('clickable', s.clickable);
  el.style.cursor = s.clickable ? 'pointer' : 'default';
  el.title = syncLastError || (s.clickable ? '点击重试' : (syncLastSyncedAt ? '最后同步 ' + syncLastSyncedAt.toLocaleTimeString('zh-CN') : ''));
}

function retrySyncNow() {
  if (syncStatus === 'syncing') return;
  if (syncStatus === 'no-token') { showSettingsModal(); return; }
  saveToGitHub(data).then(ok => { if (!ok) scheduleSyncRetry(); });
}

function scheduleSyncRetry() {
  if (syncRetryTimer) clearTimeout(syncRetryTimer);
  syncRetryTimer = setTimeout(() => {
    syncRetryTimer = null;
    if (syncStatus === 'failed' || syncStatus === 'pending') retrySyncNow();
  }, 30000);
}

async function saveToGitHub(d) {
  const config = getGHConfig();
  if (!config || !config.token) {
    setSyncStatus('no-token', 'Token 未配置');
    return false;
  }
  setSyncStatus('syncing');

  const url = `https://api.github.com/repos/${config.owner}/${config.repo}/contents/data.json`;
  try {
    // Get current file SHA and content
    const getRes = await fetch(url, {
      headers: { 'Authorization': `token ${config.token}` }
    });
    let sha = null;
    if (getRes.ok) {
      const file = await getRes.json();
      sha = file.sha;
      // Merge remote prices and history to avoid overwriting GitHub Actions updates
      try {
        const remoteData = JSON.parse(decodeURIComponent(escape(atob(file.content.replace(/\n/g, '')))));
        if (remoteData && remoteData.accounts) {
          // Build ticker->price map from remote
          const remotePrices = {};
          remoteData.accounts.forEach(a => a.holdings.forEach(h => {
            if (h.currentPrice) remotePrices[h.ticker] = h.currentPrice;
          }));
          // Update local holdings: keep remote price if local hasn't changed it
          d.accounts.forEach(a => a.holdings.forEach(h => {
            if (!h._priceEditedLocally && remotePrices[h.ticker]) {
              h.currentPrice = remotePrices[h.ticker];
            }
          }));
          // Merge history: keep longer/newer entries from remote
          if (remoteData.history) {
            Object.keys(remoteData.history).forEach(accId => {
              if (!d.history[accId]) {
                d.history[accId] = remoteData.history[accId];
              } else {
                const localDates = new Set(d.history[accId].map(h => h.date));
                remoteData.history[accId].forEach(rh => {
                  if (!localDates.has(rh.date)) d.history[accId].push(rh);
                });
                d.history[accId].sort((a, b) => a.date.localeCompare(b.date));
              }
            });
          }
        }
      } catch(mergeErr) {
        console.warn('Merge remote data failed, saving local as-is:', mergeErr);
      }
    }

    // Update file
    const body = {
      message: `Update data ${new Date().toISOString().slice(0,16)}`,
      content: btoa(unescape(encodeURIComponent(JSON.stringify(d, null, 2)))),
    };
    if (sha) body.sha = sha;

    const putRes = await fetch(url, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${config.token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (putRes.ok) {
      setSyncStatus('synced');
      return true;
    } else {
      const err = await putRes.json();
      console.error('GitHub API error:', err);
      const msg = err.message || ('HTTP ' + putRes.status);
      setSyncStatus('failed', msg);
      scheduleSyncRetry();
      showToast('同步失败: ' + msg, 'error');
      return false;
    }
  } catch(e) {
    console.error('GitHub sync error:', e);
    setSyncStatus('failed', e.message);
    scheduleSyncRetry();
    showToast('同步失败: ' + e.message, 'error');
    return false;
  }
}

async function saveData(d) {
  d.lastUpdate = new Date().toISOString();
  saveLocalCache(d);
  const config = getGHConfig();
  if (!config || !config.token) {
    setSyncStatus('no-token', 'Token 未配置，改动仅保存在本地');
    return;
  }
  setSyncStatus('pending');
  if (saveData._timer) clearTimeout(saveData._timer);
  saveData._timer = setTimeout(async () => {
    const ok = await saveToGitHub(d);
    if (!ok) scheduleSyncRetry();
  }, 2000);
}

let data = getDefaultData();

async function initData() {
  const remote = await loadRemoteData();
  const local = loadLocalData();

  let localNewer = false;
  if (remote && local) {
    const rt = remote.lastUpdate || '';
    const lt = local.lastUpdate || '';
    localNewer = lt > rt;
    data = localNewer ? local : remote;
  } else if (remote) {
    data = remote;
  } else if (local) {
    data = local;
    localNewer = true;
  }

  if (remote && remote.indices) {
    data.indices = remote.indices;
  }

  saveLocalCache(data);

  if (!data.activeAccountId && data.accounts.length > 0) {
    data.activeAccountId = data.accounts[0].id;
  }

  renderAll();

  const cfg = getGHConfig();
  if (!cfg || !cfg.token) {
    setSyncStatus('no-token', 'Token 未配置，改动仅保存在本地');
  } else if (localNewer) {
    setSyncStatus('pending', '检测到未同步的本地改动，正在推送…');
    const ok = await saveToGitHub(data);
    if (!ok) scheduleSyncRetry();
  } else {
    setSyncStatus('synced');
  }
}

// ==================== Data Helpers ====================
function isAllView() {
  return data.activeAccountId === '__all__';
}

function getActiveAccount() {
  if (isAllView()) return null;
  return data.accounts.find(a => a.id === data.activeAccountId) || data.accounts[0];
}

function getAllHoldings() {
  const all = [];
  data.accounts.forEach(a => {
    a.holdings.forEach((h, idx) => {
      all.push({ ...h, _accountName: a.name, _accountId: a.id, _holdingIdx: idx });
    });
  });
  return all;
}

function getViewHoldings() {
  if (isAllView()) return getAllHoldings();
  const acc = getActiveAccount();
  return acc ? acc.holdings.map((h, idx) => ({ ...h, _accountId: acc.id, _holdingIdx: idx })) : [];
}

// ==================== Price Fetching ====================
async function triggerGitHubAction() {
  const config = getGHConfig();
  if (!config || !config.token) return false;

  try {
    const res = await fetch(
      `https://api.github.com/repos/${config.owner}/${config.repo}/actions/workflows/update.yml/dispatches`,
      {
        method: 'POST',
        headers: {
          'Authorization': `token ${config.token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ ref: 'main' })
      }
    );
    return res.status === 204;
  } catch(e) {
    return false;
  }
}

async function refreshPrices() {
  const allHoldings = [];
  data.accounts.forEach(a => a.holdings.forEach(h => allHoldings.push(h)));

  if (allHoldings.length === 0) {
    showToast('没有持仓需要刷新', 'error');
    return;
  }

  showToast('正在触发价格更新...');

  // Trigger GitHub Actions workflow
  const triggered = await triggerGitHubAction();
  if (triggered) {
    showToast('已触发自动更新，正在等待完成...', 'success');
    // Poll remote data.json for updated lastUpdate timestamp
    const oldUpdate = data.lastUpdate || '';
    let attempts = 0;
    const maxAttempts = 12; // 12 x 15s = 3 minutes max
    const pollInterval = 15000;
    const poll = async () => {
      attempts++;
      try {
        const remote = await loadRemoteData();
        if (remote && remote.lastUpdate && remote.lastUpdate > oldUpdate) {
          // Remote data has been updated by Actions — apply it
          // Preserve local edits (shares, cost, sector, target) while taking remote prices
          const remotePrices = {};
          remote.accounts.forEach(a => a.holdings.forEach(h => {
            if (h.currentPrice) remotePrices[h.ticker] = h.currentPrice;
          }));
          data.accounts.forEach(a => a.holdings.forEach(h => {
            if (remotePrices[h.ticker]) h.currentPrice = remotePrices[h.ticker];
          }));
          // Merge history from remote
          if (remote.history) {
            Object.keys(remote.history).forEach(accId => {
              if (!data.history[accId]) {
                data.history[accId] = remote.history[accId];
              } else {
                const localDates = new Set(data.history[accId].map(h => h.date));
                remote.history[accId].forEach(rh => {
                  if (!localDates.has(rh.date)) data.history[accId].push(rh);
                });
                data.history[accId].sort((a, b) => a.date.localeCompare(b.date));
              }
            });
          }
          data.lastUpdate = remote.lastUpdate;
          saveLocalCache(data);
          renderAll();
          showToast('价格已更新', 'success');
          return;
        }
      } catch(e) {}
      if (attempts < maxAttempts) {
        showToast(`等待价格更新中... (${attempts}/${maxAttempts})`, 'success');
        setTimeout(poll, pollInterval);
      } else {
        showToast('更新超时，请稍后手动刷新页面', 'error');
      }
    };
    setTimeout(poll, 30000); // First check after 30s (Actions needs startup time)
  } else {
    showToast('触发失败，请检查 GitHub 设置或手动在 GitHub Actions 中运行', 'error');
  }
}

function recordHistoryForAccount(account) {
  const today = new Date().toISOString().slice(0, 10);
  const totalVal = account.holdings.reduce((s, h) => s + h.shares * (h.currentPrice || h.costPerShare), 0);

  if (!data.history[account.id]) data.history[account.id] = [];
  const hist = data.history[account.id];
  const existing = hist.findIndex(h => h.date === today);
  if (existing >= 0) {
    hist[existing].value = totalVal;
  } else {
    hist.push({ date: today, value: totalVal });
  }
  if (hist.length > 365) hist.splice(0, hist.length - 365);
}

// ==================== Rendering ====================
function renderIndices() {
  const bar = document.getElementById('indicesBar');
  const indices = data.indices;
  if (!indices || Object.keys(indices).length === 0) {
    bar.style.display = 'none';
    return;
  }
  bar.style.display = '';
  const order = ['^GSPC', '^NDX', '^RUT', '^DJI'];
  const syms = order.filter(s => indices[s]);

  bar.innerHTML = syms.map(sym => {
    const d = indices[sym];
    const fmtPct = (label, v) => {
      if (v == null) return `<span class="idx-tag flat">${label} --</span>`;
      const cls = v > 0 ? 'up' : v < 0 ? 'down' : 'flat';
      const sign = v > 0 ? '+' : '';
      return `<span class="idx-tag ${cls}">${label} ${sign}${v.toFixed(2)}%</span>`;
    };
    const priceColor = d.daily > 0 ? '#9DC4A3' : d.daily < 0 ? '#D59E9E' : '#F2EBD7';
    return `<div class="index-card">
      <div class="idx-top">
        <div class="idx-name">${d.name}</div>
        <div class="idx-price" style="color:${priceColor}">${d.price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
      </div>
      <div class="idx-periods">
        ${fmtPct('日', d.daily)}${fmtPct('月', d.m1)}${fmtPct('季', d.m3)}${fmtPct('年', d.ytd)}
      </div>
    </div>`;
  }).join('');
}

function renderAll() {
  renderIndices();
  renderSidebar();
  renderSummary();
  renderTable();
  renderPieChart();
  renderLineChart();
  renderUpdateTime();
}

function renderSidebar() {
  renderAccountTabs();
}

function renderAccountTabs() {
  const tabs = document.getElementById('accountTabs');
  let totalAll = 0, plAll = 0;
  data.accounts.forEach(a => {
    const tv = a.holdings.reduce((s,h) => s + h.shares * (h.currentPrice || h.costPerShare), 0);
    const tc = a.holdings.reduce((s,h) => s + h.shares * h.costPerShare, 0);
    totalAll += tv + (a.cash || 0);
    plAll += (tv - tc);
  });

  const plAllPct = (() => {
    let tcAll = 0;
    data.accounts.forEach(a => { tcAll += a.holdings.reduce((s,h) => s + h.shares * h.costPerShare, 0); });
    return tcAll > 0 ? (plAll / tcAll * 100) : 0;
  })();
  let html = `<div class="account-tab hero ${isAllView() ? 'active' : ''}" onclick="selectAllAccounts()">
    <div class="name">全部账户 <span class="pct ${plAll >= 0 ? 'gain' : 'loss'}">${plAll >= 0 ? '+' : ''}${plAllPct.toFixed(1)}%</span></div>
    <div class="info">$${fmt(totalAll)}</div>
  </div>`;

  data.accounts.forEach(a => {
    const tv = a.holdings.reduce((s,h) => s + h.shares * (h.currentPrice || h.costPerShare), 0);
    const tc = a.holdings.reduce((s,h) => s + h.shares * h.costPerShare, 0);
    const cash = a.cash || 0;
    const pl = tv - tc;
    const plPct = tc > 0 ? (pl / tc * 100) : 0;
    html += `<div class="account-tab ${!isAllView() && a.id === data.activeAccountId ? 'active' : ''}" onclick="selectAccount('${a.id}')" ondblclick="renameAccount(event, '${a.id}')" oncontextmenu="accountContextMenu(event, '${a.id}')" title="双击重命名 · 右键删除">
      <div class="name">${escHtml(a.name)} <span class="pct ${pl >= 0 ? 'gain' : 'loss'}">${pl >= 0 ? '+' : ''}${plPct.toFixed(1)}%</span></div>
      <div class="info">$${fmt(tv + cash)}</div>
    </div>`;
  });
  html += `<div class="account-tab add-tab" onclick="showAddAccountModal()" title="添加组合">+</div>`;
  tabs.innerHTML = html;
}

function renderSummary() {
  const holdings = getViewHoldings();

  const totalVal = holdings.reduce((s,h) => s + h.shares * (h.currentPrice || h.costPerShare), 0);
  const totalCost = holdings.reduce((s,h) => s + h.shares * h.costPerShare, 0);
  const pl = totalVal - totalCost;
  const plPct = totalCost > 0 ? (pl / totalCost * 100) : 0;

  // Cash
  let cash = 0;
  if (isAllView()) {
    data.accounts.forEach(a => { cash += (a.cash || 0); });
    document.getElementById('accountHeader').textContent = `全部账户 · ${holdings.length} 个持仓`;
  } else {
    const account = getActiveAccount();
    cash = account?.cash || 0;
    document.getElementById('accountHeader').textContent = `${account.name} · ${holdings.length} 个持仓`;
  }

  const totalAssets = totalVal + cash;
  document.getElementById('totalAssets').textContent = `$${fmt(totalAssets)}`;
  document.getElementById('totalValue').textContent = `$${fmt(totalVal)}`;

  const plEl = document.getElementById('totalPL');
  plEl.textContent = `${pl >= 0 ? '+' : ''}$${fmt(Math.abs(pl))}`;
  plEl.className = `value ${pl >= 0 ? 'gain' : 'loss'}`;

  const pctEl = document.getElementById('totalPLPct');
  pctEl.textContent = `${pl >= 0 ? '+' : ''}${plPct.toFixed(2)}%`;
  pctEl.className = `sub-value ${pl >= 0 ? 'gain' : 'loss'}`;

  document.getElementById('cashInput').value = cash || '';
  const cashPct = totalAssets > 0 ? (cash / totalAssets * 100).toFixed(1) : '0.0';
  document.getElementById('cashPct').textContent = cash > 0 ? `${cashPct}%` : '';
  document.getElementById('cashInput').disabled = isAllView();

  // Daily P&L: sum each holding's market-day change, immune to position/cash edits.
  // yesterdayValue_i = shares_i * price_i / (1 + dailyPct_i/100)
  // Cash has no daily change, so yesterday cash = current cash.
  const dailyEl = document.getElementById('dailyPL');
  let hasDailyData = false;
  let yesterdayTotal = cash;
  holdings.forEach(h => {
    const price = Number(h.currentPrice) || 0;
    const shares = Number(h.shares) || 0;
    const pct = Number(h.dailyPct);
    if (Number.isFinite(pct) && pct !== 0) hasDailyData = true;
    const denom = 1 + (Number.isFinite(pct) ? pct : 0) / 100;
    yesterdayTotal += (shares * price) / (denom || 1);
  });
  const prevValue = hasDailyData && yesterdayTotal > 0 ? yesterdayTotal : null;
  const dailyPctEl = document.getElementById('dailyPLPct');
  if (prevValue && prevValue > 0) {
    const dailyDiff = totalAssets - prevValue;
    const dailyPct = dailyDiff / prevValue * 100;
    dailyEl.textContent = `${dailyDiff >= 0 ? '+' : ''}$${fmt(Math.abs(dailyDiff))}`;
    dailyEl.className = `value ${dailyDiff >= 0 ? 'gain' : 'loss'}`;
    dailyPctEl.textContent = `${dailyPct >= 0 ? '+' : ''}${dailyPct.toFixed(2)}%`;
    dailyPctEl.className = `sub-value ${dailyPct >= 0 ? 'gain' : 'loss'}`;
  } else {
    dailyEl.textContent = '--';
    dailyEl.className = 'value';
    dailyPctEl.textContent = '--';
    dailyPctEl.className = 'sub-value';
  }
}

// ==================== Column System ====================
const BASE_COLUMNS = [
  { id: 'type', label: '类型', w: 58 },
  { id: 'shares', label: '数量', w: 70 },
  { id: 'cost', label: '成本', w: 72 },
  { id: 'price', label: '现价', w: 72 },
  { id: 'mv', label: '市值', w: 90 },
  { id: 'pl', label: '盈亏', w: 85 },
  { id: 'plpct', label: '盈亏%', w: 70 },
  { id: 'dailypl', label: '当日盈亏', w: 85 },
  { id: 'weight', label: '占比', w: 55 },
  { id: 'target', label: '目标%', w: 62 },
  { id: 'adjust', label: '调整', w: 65 },
  { id: 'shortfloat', label: '空头占比', w: 72 },
  { id: 'sector', label: '板块', w: 80 },
];

function getColumnOrder() {
  try {
    const saved = localStorage.getItem('portfolio_col_order');
    if (saved) {
      const arr = JSON.parse(saved);
      const baseIds = BASE_COLUMNS.map(c => c.id);
      if (baseIds.every(id => arr.includes(id)) && arr.length === baseIds.length) return arr;
    }
  } catch(e) {}
  return BASE_COLUMNS.map(c => c.id);
}
function saveColumnOrder(order) { localStorage.setItem('portfolio_col_order', JSON.stringify(order)); }

let colOrder = getColumnOrder();
const SORTABLE_COLS = ['pl', 'plpct', 'dailypl', 'weight', 'shortfloat'];
let sortCol = 'weight', sortDir = -1; // 0=none, 1=asc, -1=desc; default: 占比 降序

function toggleSort(colId) {
  if (sortCol === colId) {
    sortDir = sortDir === -1 ? 1 : sortDir === 1 ? 0 : -1;
  } else {
    sortCol = colId;
    sortDir = -1; // default descending
  }
  if (sortDir === 0) sortCol = null;
  renderTable();
}

function getSortValue(h, colId, totalVal) {
  const mv = h.shares * (h.currentPrice || h.costPerShare);
  const pl = mv - h.shares * h.costPerShare;
  const plPct = h.costPerShare > 0 ? ((h.currentPrice || h.costPerShare) / h.costPerShare - 1) * 100 : 0;
  const weight = totalVal > 0 ? (mv / totalVal * 100) : 0;
  const dailyPct = h.dailyPct || 0;
  const prevPrice = (h.currentPrice || h.costPerShare) / (1 + dailyPct / 100);
  const dailyPl = h.shares * ((h.currentPrice || h.costPerShare) - prevPrice);
  switch(colId) {
    case 'pl': return pl;
    case 'plpct': return plPct;
    case 'dailypl': return dailyPl;
    case 'weight': return weight;
    case 'shortfloat': return h.shortFloat == null ? -1 : Number(h.shortFloat);
    default: return 0;
  }
}

const TICKER_PALETTE = [
  '#dc2626', '#ea580c', '#d97706', '#65a30d',
  '#059669', '#0d9488', '#0891b2', '#2563eb',
  '#4f46e5', '#7c3aed', '#9333ea', '#db2777'
];
function tickerBadge(ticker) {
  let h = 0;
  for (let i = 0; i < ticker.length; i++) h = (h * 31 + ticker.charCodeAt(i)) >>> 0;
  const bg = TICKER_PALETTE[h % TICKER_PALETTE.length];
  return `<span class="tk-badge" style="background:${bg};">${escHtml(ticker)}</span>`;
}

function getCellHtml(colId, h, accId, idx, totalVal) {
  const mv = h.shares * (h.currentPrice || h.costPerShare);
  const pl = mv - h.shares * h.costPerShare;
  const plPct = h.costPerShare > 0 ? ((h.currentPrice || h.costPerShare) / h.costPerShare - 1) * 100 : 0;
  const weight = totalVal > 0 ? (mv / totalVal * 100) : 0;
  let adjustText = '-', adjustClass = '';
  if (h.targetPct != null && h.targetPct !== '' && (h.currentPrice || h.costPerShare) > 0) {
    const ts = (h.targetPct / 100 * totalVal) / (h.currentPrice || h.costPerShare);
    const diff = Math.round(ts - h.shares);
    if (diff > 0) { adjustText = `+${diff}`; adjustClass = 'adjust-buy'; }
    else if (diff < 0) { adjustText = `${diff}`; adjustClass = 'adjust-sell'; }
    else { adjustText = '0'; }
  }
  switch(colId) {
    case 'account': return `<td><span style="font-size:12px;color:#6D6557;background:#DDD4BF;padding:2px 8px;border-radius:4px;">${escHtml(h._accountName)}</span></td>`;
    case 'type': return `<td><span class="type-badge">${h.type || 'STOCK'}</span></td>`;
    case 'shares': return `<td><input class="editable-input" type="number" step="1" min="0" value="${h.shares}" onchange="updateFieldByRef('${accId}',${idx},'shares',this.value)"></td>`;
    case 'cost': return `<td><input class="editable-input" type="number" step="0.01" min="0" value="${h.costPerShare}" onchange="updateFieldByRef('${accId}',${idx},'costPerShare',this.value)"></td>`;
    case 'price': return `<td>$${fmt(h.currentPrice || h.costPerShare)}</td>`;
    case 'mv': return `<td>$${fmt(mv)}</td>`;
    case 'pl': return `<td class="${pl >= 0 ? 'gain' : 'loss'}">${pl >= 0 ? '+' : ''}$${fmt(Math.abs(pl))}</td>`;
    case 'plpct': return `<td class="${plPct >= 0 ? 'gain' : 'loss'}">${plPct >= 0 ? '+' : ''}${plPct.toFixed(2)}%</td>`;
    case 'dailypl': {
      const dailyPct = h.dailyPct;
      if (dailyPct == null) return `<td>—</td>`;
      const prevPrice = (h.currentPrice || h.costPerShare) / (1 + dailyPct / 100);
      const dailyPl = h.shares * ((h.currentPrice || h.costPerShare) - prevPrice);
      const cls = dailyPl >= 0 ? 'gain' : 'loss';
      const sign = dailyPl >= 0 ? '+' : '-';
      return `<td class="${cls}">${sign}$${fmt(Math.abs(dailyPl))}<div style="font-size:10px;font-weight:500;">${dailyPct >= 0 ? '+' : ''}${dailyPct.toFixed(2)}%</div></td>`;
    }
    case 'weight': return `<td>${weight.toFixed(1)}%</td>`;
    case 'target': return `<td><input class="editable-input" type="number" step="0.1" min="0" max="100" value="${h.targetPct ?? ''}" placeholder="—" onchange="updateTargetByRef('${accId}',${idx},this.value)"></td>`;
    case 'adjust': return `<td class="${adjustClass}">${adjustText}</td>`;
    case 'shortfloat': {
      const sf = h.shortFloat;
      if (sf == null) return `<td style="color:#6D6557;">—</td>`;
      let color = '#6D6557';
      if (sf >= 20) color = '#9A2D2D';
      else if (sf >= 10) color = '#ff9800';
      const src = h.shortFloatSource ? ` title="来源: ${h.shortFloatSource}"` : '';
      return `<td style="color:${color};font-weight:600;"${src}>${sf.toFixed(2)}%</td>`;
    }
    case 'sector': {
      const isCustom = h.sector && !SECTORS.includes(h.sector);
      const opts = SECTORS.map(s => `<option value="${s}" ${h.sector === s ? 'selected' : ''}>${s}</option>`).join('');
      const customOpt = `<option value="__custom__" ${isCustom ? '' : ''}>自定义...</option>`;
      const customSelected = isCustom ? `<option value="${escHtml(h.sector)}" selected>${escHtml(h.sector)}</option>` : '';
      return `<td><select class="sector-select" onchange="handleSectorChange('${accId}',${idx},this)">${opts}${customSelected}${customOpt}</select></td>`;
    }
    default: return '<td></td>';
  }
}

function renderTable() {
  const headTr = document.getElementById('holdingsHead');
  const tbody = document.getElementById('holdingsBody');
  const holdings = getViewHoldings();
  const allView = isAllView();
  const totalVal = holdings.reduce((s,h) => s + h.shares * (h.currentPrice || h.costPerShare), 0);
  let cash = 0;
  if (isAllView()) { data.accounts.forEach(a => { cash += (a.cash || 0); }); }
  else { const acc = getActiveAccount(); cash = acc?.cash || 0; }
  const totalAssets = totalVal + cash;

  const activeCols = ['ticker'];
  if (allView) activeCols.push('account');
  colOrder.forEach(id => activeCols.push(id));
  activeCols.push('_delete');

  const colPct = { type:4, shares:6, cost:6, price:7, mv:8, pl:7, plpct:6, dailypl:8, weight:5, target:5, adjust:7, shortfloat:6, sector:8 };
  const tickerPct = allView ? 5 : 6;
  const accountPct = allView ? 6 : 0;
  const deletePct = 3;
  let headHtml = `<th style="width:${tickerPct}%">代码</th>`;
  if (allView) headHtml += `<th style="width:${accountPct}%">账户</th>`;
  // Calculate target sum for header
  const targetSum = getTargetSum();

  colOrder.forEach(id => {
    const col = BASE_COLUMNS.find(c => c.id === id);
    const isSortable = SORTABLE_COLS.includes(id);
    const arrow = isSortable ? (sortCol === id ? (sortDir === 1 ? ' ▲' : ' ▼') : ' ⇅') : '';
    const sortAttr = isSortable ? `onclick="toggleSort('${id}')" style="cursor:pointer;"` : '';
    let extra = '';
    if (id === 'target') {
      const color = targetSum > 100 ? '#9A2D2D' : targetSum === 100 ? '#2B5A3C' : '#6D6557';
      extra = `<div style="font-size:10px;color:${color};font-weight:600;">${targetSum}%</div>`;
    }
    headHtml += `<th class="draggable" draggable="true" data-col="${id}" ${sortAttr} style="width:${colPct[id]||7}%">${col.label}${arrow}${extra}</th>`;
  });
  headHtml += `<th style="width:${deletePct}%"></th>`;
  headTr.innerHTML = headHtml;

  // Sort if active
  if (sortCol && sortDir !== 0) {
    holdings.sort((a, b) => {
      const va = getSortValue(a, sortCol, totalAssets);
      const vb = getSortValue(b, sortCol, totalAssets);
      return (va - vb) * sortDir;
    });
  }

  if (holdings.length === 0) {
    tbody.innerHTML = `<tr><td colspan="${activeCols.length}" style="text-align:center;padding:40px;color:#6D6557;">暂无持仓，点击"添加持仓"开始</td></tr>`;
  } else {
    let html = '';
    holdings.forEach(h => {
      const accId = h._accountId, idx = h._holdingIdx;
      html += '<tr>';
      html += `<td class="ticker-cell"><div class="ticker">${tickerBadge(h.ticker)}</div></td>`;
      if (allView) html += getCellHtml('account', h, accId, idx, totalAssets);
      colOrder.forEach(id => { html += getCellHtml(id, h, accId, idx, totalAssets); });
      html += `<td><button class="delete-btn" onclick="deleteHoldingByRef('${accId}',${idx})" title="删除">x</button></td>`;
      html += '</tr>';
    });
    // Cash row
    html += renderCashRow(allView, cash, totalAssets, activeCols.length);
    tbody.innerHTML = html;
  }

  initTableInteractions();
}

function renderCashRow(allView, cash, totalAssets, colCount) {
  const weightPct = totalAssets > 0 ? (cash / totalAssets * 100).toFixed(1) : '0.0';

  // Get cash target from current view
  let cashTarget = null;
  if (isAllView()) {
    // Sum all account cash targets - not editable in all view
  } else {
    const acc = getActiveAccount();
    cashTarget = acc?.cashTargetPct ?? null;
  }

  let adjustText = '-', adjustClass = '';
  if (cashTarget != null && cashTarget !== '' && totalAssets > 0) {
    const targetCash = cashTarget / 100 * totalAssets;
    const diff = targetCash - cash;
    if (diff > 1) { adjustText = `+$${fmt(diff)}`; adjustClass = 'adjust-buy'; }
    else if (diff < -1) { adjustText = `-$${fmt(Math.abs(diff))}`; adjustClass = 'adjust-sell'; }
    else { adjustText = '0'; }
  }

  let html = '<tr style="background:#ECE8D5;border-top:2px solid #CEC2A7;">';
  html += '<td class="ticker-cell"><div class="ticker"><span class="tk-badge" style="background:#2B5A3C;">CASH</span></div></td>';
  if (allView) html += '<td>-</td>';

  colOrder.forEach(id => {
    switch(id) {
      case 'type': html += '<td><span class="type-badge" style="background:#E2E8D5;color:#2B5A3C;">CASH</span></td>'; break;
      case 'shares': html += `<td><input class="editable-input" type="number" step="0.01" min="0" value="${cash || ''}" onchange="updateCash(this.value)" ${isAllView() ? 'disabled' : ''}></td>`; break;
      case 'cost': html += '<td>-</td>'; break;
      case 'price': html += '<td>-</td>'; break;
      case 'mv': html += `<td>$${fmt(cash)}</td>`; break;
      case 'pl': html += '<td>-</td>'; break;
      case 'plpct': html += '<td>-</td>'; break;
      case 'weight': html += `<td>${weightPct}%</td>`; break;
      case 'target': html += `<td><input class="editable-input" type="number" step="0.1" min="0" max="100" value="${cashTarget ?? ''}" placeholder="—" onchange="updateCashTarget(this.value)" ${isAllView() ? 'disabled' : ''}></td>`; break;
      case 'adjust': html += `<td class="${adjustClass}">${adjustText}</td>`; break;
      case 'sector': html += '<td>-</td>'; break;
      default: html += '<td></td>';
    }
  });
  html += '<td></td></tr>';
  return html;
}

function updateCashTarget(value) {
  if (isAllView()) return;
  const account = getActiveAccount();
  if (!account) return;
  account.cashTargetPct = value === '' ? null : parseFloat(value);
  saveData(data);
  renderTable();
  const sum = getTargetSum();
  if (sum > 100) showToast(`目标%总和 ${sum}%，超过100%`, 'error');
}

function initTableInteractions() {
  const headTr = document.getElementById('holdingsHead');
  let dragSrcCol = null;

  headTr.querySelectorAll('th.draggable').forEach(th => {
    th.addEventListener('dragstart', (e) => {
      dragSrcCol = th.dataset.col;
      th.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragSrcCol);
    });
    th.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; th.classList.add('drag-over'); });
    th.addEventListener('dragleave', () => { th.classList.remove('drag-over'); });
    th.addEventListener('drop', (e) => {
      e.preventDefault();
      th.classList.remove('drag-over');
      const targetCol = th.dataset.col;
      if (dragSrcCol && dragSrcCol !== targetCol) {
        const srcIdx = colOrder.indexOf(dragSrcCol);
        const tgtIdx = colOrder.indexOf(targetCol);
        if (srcIdx >= 0 && tgtIdx >= 0) {
          colOrder.splice(srcIdx, 1);
          colOrder.splice(tgtIdx, 0, dragSrcCol);
          saveColumnOrder(colOrder);
          renderTable();
        }
      }
    });
    th.addEventListener('dragend', () => {
      th.classList.remove('dragging');
      headTr.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      dragSrcCol = null;
    });
  });
}

Chart.register(ChartDataLabels);
let pieChart = null, lineChart = null, piePulseTimer = null;
let pieMode = 'holding';

function setPieMode(mode) {
  pieMode = mode;
  document.getElementById('pieTabHolding').classList.toggle('active', mode === 'holding');
  document.getElementById('pieTabSector').classList.toggle('active', mode === 'sector');
  renderPieChart();

function renderPieChart() {
  const holdings = getViewHoldings();
  if (holdings.length === 0) {
    if (pieChart) { pieChart.destroy(); pieChart = null; }
    return;
  }

  const colors = ['#4e79a7','#59a14f','#f28e2b','#e15759','#76b7b2','#edc948','#b07aa1','#ff9da7','#9c755f','#bab0ac','#a0cbe8','#ffbe7d','#86bcb6','#d4a6c8'];

  // Calculate cash
  let cash = 0;
  if (isAllView()) { data.accounts.forEach(a => { cash += (a.cash || 0); }); }
  else { const acc = getActiveAccount(); cash = acc?.cash || 0; }

  let labels, values, totalVal;
  const holdingsVal = holdings.reduce((s,h) => s + h.shares * (h.currentPrice || h.costPerShare), 0);
  totalVal = holdingsVal + cash;

  if (pieMode === 'sector') {
    const sectorMap = {};
    holdings.forEach(h => {
      const sec = h.sector || '其他';
      const val = h.shares * (h.currentPrice || h.costPerShare);
      sectorMap[sec] = (sectorMap[sec] || 0) + val;
    });
    if (cash > 0) sectorMap['现金'] = cash;
    const entries = Object.entries(sectorMap).sort((a,b) => b[1] - a[1]);
    labels = entries.map(e => e[0]);
    values = entries.map(e => e[1]);
  } else {
    const entries = holdings.map(h => {
      const sec = h.sector || '';
      const acc = isAllView() && h._accountName ? `(${h._accountName})` : '';
      return {
        label: sec ? `${h.ticker} ${sec}${acc}` : `${h.ticker}${acc}`,
        value: h.shares * (h.currentPrice || h.costPerShare)
      };
    });
    if (cash > 0) entries.push({ label: '现金', value: cash });
    entries.sort((a, b) => b.value - a.value);
    labels = entries.map(e => e.label);
    values = entries.map(e => e.value);
  }

  const ctx = document.getElementById('pieChart').getContext('2d');
  if (pieChart) pieChart.destroy();

  // Compute YTD return: (current total - earliest YTD total) / earliest YTD total
  const yearStr = String(new Date().getFullYear());
  let ytdPct = null;
  const accHist = isAllView()
    ? (() => { const m = {}; data.accounts.forEach(a => (data.history[a.id] || []).forEach(h => { m[h.date] = (m[h.date] || 0) + (h.value || 0); })); return Object.entries(m).map(([date, value]) => ({ date, value })).sort((a,b) => a.date.localeCompare(b.date)); })()
    : (data.history[getActiveAccount()?.id] || []).slice().sort((a,b) => a.date.localeCompare(b.date));
  const ytdEntries = accHist.filter(h => h.date.startsWith(yearStr));
  if (ytdEntries.length >= 2 && ytdEntries[0].value > 0) {
    ytdPct = (ytdEntries[ytdEntries.length - 1].value - ytdEntries[0].value) / ytdEntries[0].value * 100;
  }

  const centerTextPlugin = {
    id: 'centerText',
    afterDraw: (chart) => {
      const { ctx, chartArea } = chart;
      if (!chartArea) return;
      const cx = (chartArea.left + chartArea.right) / 2;
      const cy = (chartArea.top + chartArea.bottom) / 2;
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const hasYtd = ytdPct != null;
      ctx.fillStyle = '#2A2F25';
      ctx.font = 'bold 26px system-ui, -apple-system, sans-serif';
      ctx.fillText(`$${fmt(totalVal)}`, cx, hasYtd ? cy - 10 : cy);
      if (hasYtd) {
        const sign = ytdPct >= 0 ? '+' : '';
        ctx.fillStyle = ytdPct >= 0 ? '#2B5A3C' : '#9A2D2D';
        ctx.font = '13px system-ui, -apple-system, sans-serif';
        ctx.fillText(`年初至今 ${sign}${ytdPct.toFixed(2)}%`, cx, cy + 18);
      }
      ctx.restore();
    }
  };

  // High-concentration highlight: slices >= 30% pulse with red glowing border
  const CONCENTRATION_THRESHOLD = 30;
  const highIndices = values
    .map((v, i) => ({ i, pct: totalVal > 0 ? v / totalVal * 100 : 0, label: labels[i] }))
    .filter(x => x.pct >= CONCENTRATION_THRESHOLD && !/^现金/.test(x.label))
    .map(x => x.i);

  const pulsePlugin = {
    id: 'concentrationPulse',
    afterDatasetsDraw: (chart) => {
      if (highIndices.length === 0) return;
      const meta = chart.getDatasetMeta(0);
      const t = Math.abs(Math.sin(Date.now() / 380));
      const fillAlpha = 0.15 + 0.5 * t;
      const c = chart.ctx;
      const getAngle = (arc, key) => {
        // Prefer animation _to (final target), fall back to live property
        const a = arc.$animations && arc.$animations[key];
        return (a && typeof a._to === 'number') ? a._to : arc[key];
      };
      highIndices.forEach(i => {
        const arc = meta.data[i];
        if (!arc) return;
        const sa = getAngle(arc, 'startAngle');
        const ea = getAngle(arc, 'endAngle');
        const oR = getAngle(arc, 'outerRadius');
        const iR = getAngle(arc, 'innerRadius');
        const x = getAngle(arc, 'x');
        const y = getAngle(arc, 'y');
        if (Math.abs(ea - sa) < 1e-4) return;
        c.save();
        c.beginPath();
        c.arc(x, y, oR, sa, ea);
        c.arc(x, y, iR, ea, sa, true);
        c.closePath();
        c.fillStyle = `rgba(244, 67, 54, ${fillAlpha})`;
        c.fill();
        c.restore();
      });
    }
  };

  if (piePulseTimer) { cancelAnimationFrame(piePulseTimer); piePulseTimer = null; }

  pieChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data: values, backgroundColor: colors.slice(0, labels.length), borderWidth: 0 }]
    },
    plugins: [centerTextPlugin, pulsePlugin],
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              const pct = totalVal > 0 ? (ctx.parsed / totalVal * 100).toFixed(1) : 0;
              return ` ${ctx.label}: $${fmt(ctx.parsed)} (${pct}%)`;
            }
          }
        },
        datalabels: {
          color: '#fff',
          font: { size: 12, weight: 'bold' },
          formatter: (value, ctx) => {
            const pct = totalVal > 0 ? (value / totalVal * 100) : 0;
            if (pct < 4) return '';
            const label = ctx.chart.data.labels[ctx.dataIndex];
            const name = label.split(' ')[0];
            return `${name} ${pct.toFixed(0)}%`;
          },
          anchor: 'center',
          align: 'center'
        }
      },
      cutout: '55%'
    }
  });

  if (highIndices.length > 0) {
    const tick = () => {
      if (!pieChart) return;
      pieChart.draw();
      piePulseTimer = requestAnimationFrame(tick);
    };
    piePulseTimer = requestAnimationFrame(tick);
  }
}

    data.accounts.forEach(a => {
      (data.history[a.id] || []).forEach(h => {
        dateMap[h.date] = (dateMap[h.date] || 0) + pickVal(h);
      });
    });
    hist = Object.entries(dateMap).map(([date, value]) => ({ date, value }));
  } else {
    const account = getActiveAccount();
    hist = (data.history[account?.id] || []).map(h => ({ date: h.date, value: pickVal(h) }));
  }

  if (hist.length === 0) {
    if (lineChart) { lineChart.destroy(); lineChart = null; }
    return;
  }

  const now = new Date();
  let cutoff = new Date();
  if (currentTimeRange === '1m') cutoff.setMonth(now.getMonth() - 1);
  else if (currentTimeRange === '3m') cutoff.setMonth(now.getMonth() - 3);
  else if (currentTimeRange === '6m') cutoff.setMonth(now.getMonth() - 6);
  else if (currentTimeRange === '1y') cutoff.setFullYear(now.getFullYear() - 1);
  else if (currentTimeRange === '2y') cutoff.setFullYear(now.getFullYear() - 2);
  else if (currentTimeRange === '3y') cutoff.setFullYear(now.getFullYear() - 3);
  else if (currentTimeRange === '5y') cutoff.setFullYear(now.getFullYear() - 5);
  else cutoff = new Date(0); // 'all' — no cutoff

  const cutoffStr = cutoff.toISOString().slice(0, 10);
  const filtered = hist.filter(h => h.date >= cutoffStr).sort((a,b) => a.date.localeCompare(b.date));

  if (filtered.length === 0) {
    if (lineChart) { lineChart.destroy(); lineChart = null; }
    return;
  }

  // Portfolio return over selected range (always computed)
  let portfolioRet = null;
  if (filtered.length >= 2 && filtered[0].value > 0) {
    portfolioRet = (filtered[filtered.length-1].value / filtered[0].value - 1) * 100;
  }

  // Build SPX overlay: align to portfolio dates, normalize so SPX[0] == portfolio[0]
  // Only compare against SPX when chart shows market value (excl. cash) — 总资产含现金不适合对比指数
  const spxRaw = chartMode === 'market'
    ? (data.spxHistory || []).filter(s => s.date >= filtered[0].date && s.date <= filtered[filtered.length-1].date)
    : [];
  let spxAligned = [];
  let spxRet = null;
  if (spxRaw.length >= 2) {
    // For each portfolio date, find latest SPX close on or before that date
    let j = 0;
    const spxByDate = [];
    filtered.forEach(p => {
      while (j + 1 < spxRaw.length && spxRaw[j + 1].date <= p.date) j++;
      // Only use SPX value if its date is on or before portfolio date
      spxByDate.push(spxRaw[j].date <= p.date ? spxRaw[j].value : null);
    });
    // Find first non-null index for normalization base
    const firstIdx = spxByDate.findIndex(v => v != null);
    if (firstIdx >= 0) {
      const spxBase = spxByDate[firstIdx];
      const portBase = filtered[firstIdx].value;
      spxAligned = spxByDate.map(v => v == null ? null : v / spxBase * portBase);
      spxRet = (spxByDate[spxByDate.length-1] / spxBase - 1) * 100;
    }
  }

  // Update vs-SPX label
  const vsEl = document.getElementById('vsSpxLabel');
  if (vsEl) {
    if (portfolioRet != null && spxRet != null) {
      const diff = portfolioRet - spxRet;
      const sign = diff >= 0 ? '+' : '';
      const color = diff >= 0 ? '#2B5A3C' : '#9A2D2D';
      vsEl.innerHTML = `vs 标普 <span style="color:${color};font-weight:600;">${sign}${diff.toFixed(2)}%</span>`;
    } else {
      vsEl.textContent = '';
    }
  }

  const ctx = document.getElementById('lineChart').getContext('2d');
  if (lineChart) lineChart.destroy();

  const lastIdx = filtered.length - 1;
  const endLabel = (color, retPct) => ({
    display: (c) => c.dataIndex === lastIdx,
    color,
    font: { size: 11, weight: 'bold' },
    anchor: 'end', align: 'bottom', offset: 6,
    clamp: true,
    clip: false,
    formatter: (v) => {
      if (v == null || retPct == null) return '';
      const sign = retPct >= 0 ? '+' : '';
      return `${sign}${retPct.toFixed(2)}%`;
    }
  });

  const portfolioLabel = chartMode === 'market' ? '持仓市值' : '总资产';
  const titleEl = document.getElementById('lineChartTitle');
  if (titleEl) titleEl.textContent = portfolioLabel;
  const datasets = [{
    label: portfolioLabel,
    data: filtered.map(h => h.value),
    borderColor: '#2B5A3C',
    backgroundColor: 'rgba(76,175,80,0.08)',
    fill: true,
    tension: 0.3,
    pointRadius: filtered.length > 30 ? 0 : 3,
    borderWidth: 2,
    order: 1,
    datalabels: endLabel('#1F4A2F', portfolioRet)
  }];
  if (spxAligned.length > 0) {
    datasets.push({
      label: 'S&P 500 基准',
      data: spxAligned,
      borderColor: '#B8AB8E',
      backgroundColor: 'transparent',
      borderDash: [6, 4],
      fill: false,
      tension: 0.3,
      pointRadius: 0,
      borderWidth: 1.5,
      order: 2,
      datalabels: endLabel('#6D6557', spxRet)
    });
  }

  lineChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: filtered.map(h => h.date.slice(5)),
      datasets
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { right: 80, top: 18 } },
      plugins: {
        legend: {
          display: spxAligned.length > 0,
          position: 'bottom',
          labels: {
            boxWidth: 24, boxHeight: 2, font: { size: 12 }, padding: 16, color: '#6D6557',
            generateLabels: (chart) => Chart.defaults.plugins.legend.labels.generateLabels(chart).map(l => { l.lineDash = []; l.fillStyle = 'transparent'; return l; })
          }
        },
        tooltip: {
          callbacks: { label: (c) => `${c.dataset.label}: $${fmt(c.parsed.y)}` }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { maxTicksLimit: 8, font: { size: 11 } } },
        y: {
          grid: { color: '#D4C9B3' },
          ticks: { callback: v => `$${(v/1000).toFixed(0)}K`, font: { size: 11 } }
        }
      }
    }
  });
}

function renderUpdateTime() {
  const el = document.getElementById('updateTime');
  if (data.lastUpdate) {
    const d = new Date(data.lastUpdate);
    el.textContent = `更新于 ${d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })}`;
  }
}

// ==================== Actions ====================
function selectAccount(id) {
  data.activeAccountId = id;
  saveLocalCache(data);
  renderAll();
}

function selectAllAccounts() {
  data.activeAccountId = '__all__';
  saveLocalCache(data);
  renderAll();
}

function showAddHoldingModal() {
  document.getElementById('holdingModalTitle').textContent = '添加持仓';
  ['hTicker','hName','hShares','hCost'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('hType').value = 'STOCK';
  const hSec = document.getElementById('hSector');
  hSec.innerHTML = SECTORS.map(s => `<option value="${s}">${s}</option>`).join('') + '<option value="__custom__">自定义...</option>';
  hSec.value = '软件';
  hSec.onchange = function() { if (this.value === '__custom__') { const c = prompt('请输入自定义板块名称：'); if (c && c.trim()) { const o = document.createElement('option'); o.value = c.trim(); o.textContent = c.trim(); this.insertBefore(o, this.lastChild); this.value = c.trim(); } else { this.value = '软件'; } } };
  const accGroup = document.getElementById('hAccountGroup');
  const accSelect = document.getElementById('hAccount');
  if (isAllView()) {
    accGroup.style.display = '';
    accSelect.innerHTML = data.accounts.map(a => `<option value="${a.id}">${escHtml(a.name)}</option>`).join('');
  } else {
    accGroup.style.display = 'none';
  }
  document.getElementById('addHoldingModal').classList.add('show');
}

function showAddAccountModal() {
  document.getElementById('aName').value = '';
  document.getElementById('addAccountModal').classList.add('show');
}

function showSettingsModal() {
  const config = getGHConfig() || {};
  document.getElementById('sOwner').value = config.owner || '';
  document.getElementById('sRepo').value = config.repo || 'portfolio';
  document.getElementById('sToken').value = config.token || '';
  document.getElementById('settingsModal').classList.add('show');
}

function saveSettings() {
  const owner = document.getElementById('sOwner').value.trim();
  const repo = document.getElementById('sRepo').value.trim();
  const token = document.getElementById('sToken').value.trim();

  if (!owner || !repo || !token) {
    showToast('请填写完整信息', 'error');
    return;
  }

  setGHConfig({ owner, repo, token });
  closeModal('settingsModal');
  showToast('GitHub 设置已保存', 'success');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

function saveHolding() {
  const ticker = document.getElementById('hTicker').value.trim().toUpperCase();
  const name = document.getElementById('hName').value.trim();
  const type = document.getElementById('hType').value;
  const shares = parseFloat(document.getElementById('hShares').value);
  const cost = parseFloat(document.getElementById('hCost').value);
  const sector = document.getElementById('hSector').value;

  if (!ticker || !shares || !cost) {
    showToast('请填写完整信息', 'error');
    return;
  }

  let account;
  if (isAllView()) {
    const accId = document.getElementById('hAccount').value;
    account = data.accounts.find(a => a.id === accId);
  } else {
    account = getActiveAccount();
  }
  if (!account) { showToast('请选择账户', 'error'); return; }

  account.holdings.push({
    ticker, name, type, shares, costPerShare: cost,
    currentPrice: cost, targetPct: null, sector
  });

  saveData(data);
  closeModal('addHoldingModal');
  renderAll();
  showToast(`已添加 ${ticker} 到 ${account.name}`, 'success');
}

function saveAccount() {
  const name = document.getElementById('aName').value.trim();
  if (!name) { showToast('请输入组合名称', 'error'); return; }

  const newAcc = { id: Date.now().toString(), name, holdings: [] };
  data.accounts.push(newAcc);
  data.activeAccountId = newAcc.id;
  saveData(data);
  closeModal('addAccountModal');
  renderAll();
  showToast(`已创建 ${name}`, 'success');
}

function deleteHoldingByRef(accountId, index) {
  const account = data.accounts.find(a => a.id === accountId);
  if (!account) return;
  const ticker = account.holdings[index].ticker;
  if (!confirm(`确定删除 ${ticker}？`)) return;
  account.holdings.splice(index, 1);
  saveData(data);
  renderAll();
}

function getTargetSum() {
  let sum = 0;
  if (isAllView()) {
    data.accounts.forEach(a => {
      a.holdings.forEach(h => { if (h.targetPct != null) sum += h.targetPct; });
      if (a.cashTargetPct != null) sum += a.cashTargetPct;
    });
  } else {
    const acc = getActiveAccount();
    if (acc) {
      acc.holdings.forEach(h => { if (h.targetPct != null) sum += h.targetPct; });
      if (acc.cashTargetPct != null) sum += acc.cashTargetPct;
    }
  }
  return Math.round(sum * 10) / 10;
}

function updateTargetByRef(accountId, index, value) {
  const account = data.accounts.find(a => a.id === accountId);
  if (!account) return;
  account.holdings[index].targetPct = value === '' ? null : parseFloat(value);
  saveData(data);
  renderTable();
  const sum = getTargetSum();
  if (sum > 100) showToast(`目标%总和 ${sum}%，超过100%`, 'error');
}

function handleSectorChange(accountId, index, selectEl) {
  if (selectEl.value === '__custom__') {
    const custom = prompt('请输入自定义板块名称：');
    if (custom && custom.trim()) {
      updateSectorByRef(accountId, index, custom.trim());
      renderTable();
    } else {
      // Cancelled — revert to previous value
      const account = data.accounts.find(a => a.id === accountId);
      if (account) selectEl.value = account.holdings[index].sector;
    }
  } else {
    updateSectorByRef(accountId, index, selectEl.value);
  }
}

function updateSectorByRef(accountId, index, value) {
  const account = data.accounts.find(a => a.id === accountId);
  if (!account) return;
  account.holdings[index].sector = value;
  saveData(data);
}

function updateCash(value) {
  if (isAllView()) return;
  const account = getActiveAccount();
  if (!account) return;
  const num = parseFloat(value);
  account.cash = isNaN(num) || num < 0 ? 0 : num;
  saveData(data);
  renderAll();
}

function updateFieldByRef(accountId, index, field, value) {
  const account = data.accounts.find(a => a.id === accountId);
  if (!account) return;
  const num = parseFloat(value);
  if (isNaN(num) || num < 0) return;
  account.holdings[index][field] = num;
  saveData(data);
  renderAll();
}

function accountContextMenu(e, id) {
  e.preventDefault();
  if (data.accounts.length <= 1) { showToast('至少保留一个组合', 'error'); return; }
  const acc = data.accounts.find(a => a.id === id);
  if (confirm(`确定删除组合「${acc.name}」？`)) {
    data.accounts = data.accounts.filter(a => a.id !== id);
    if (data.activeAccountId === id) data.activeAccountId = data.accounts[0].id;
    saveData(data);
    renderAll();
  }
}

function renameAccount(e, id) {
  if (e) e.stopPropagation();
  const acc = data.accounts.find(a => a.id === id);
  if (!acc) return;
  const newName = prompt(`重命名组合「${acc.name}」：`, acc.name);
  if (newName == null) return;
  const trimmed = newName.trim();
  if (!trimmed) { showToast('名称不能为空', 'error'); return; }
  if (trimmed === acc.name) return;
  if (data.accounts.some(a => a.id !== id && a.name === trimmed)) {
    showToast('已存在同名组合', 'error');
    return;
  }
  acc.name = trimmed;
  saveData(data);
  renderAll();
  showToast(`已重命名为「${trimmed}」`, 'success');
}

// ==================== Import/Export ====================
function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `portfolio_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function exportExcel() {
  const wb = XLSX.utils.book_new();

  const colWidths = [
    {wch:8},{wch:14},{wch:8},{wch:6},{wch:8},{wch:10},{wch:10},{wch:12},{wch:12},{wch:12},{wch:10},{wch:8},{wch:8},{wch:10},{wch:8},{wch:10}
  ];

  function buildRows(holdings, cash, cashTargetPct, totalAssets, withAccount) {
    const rows = [];
    holdings.forEach(h => {
      const mv = h.shares * (h.currentPrice || h.costPerShare);
      const cost = h.shares * h.costPerShare;
      const pl = mv - cost;
      const plPct = cost > 0 ? (pl / cost * 100) : 0;
      const weight = totalAssets > 0 ? (mv / totalAssets * 100) : 0;
      const dailyPct = h.dailyPct;
      let dailyPl = '';
      if (dailyPct != null) {
        const prevPrice = (h.currentPrice || h.costPerShare) / (1 + dailyPct / 100);
        dailyPl = Math.round(h.shares * ((h.currentPrice || h.costPerShare) - prevPrice) * 100) / 100;
      }
      const row = {
        '代码': h.ticker,
        '名称': h.name,
      };
      if (withAccount) row['账户'] = h._accountName || '';
      Object.assign(row, {
        '类型': h.type,
        '数量': h.shares,
        '成本': h.costPerShare,
        '现价': h.currentPrice || h.costPerShare,
        '市值': Math.round(mv * 100) / 100,
        '盈亏': Math.round(pl * 100) / 100,
        '盈亏%': Math.round(plPct * 100) / 100,
        '当日盈亏': dailyPl,
        '当日盈亏%': dailyPct != null ? Math.round(dailyPct * 100) / 100 : '',
        '占比%': Math.round(weight * 100) / 100,
        '目标%': h.targetPct || '',
        '空头占比%': h.shortFloat != null ? h.shortFloat : '',
        '板块': h.sector || ''
      });
      rows.push(row);
    });
    const cashRow = { '代码': 'CASH', '名称': '现金' };
    if (withAccount) cashRow['账户'] = '';
    Object.assign(cashRow, {
      '类型': 'CASH', '数量': cash, '成本': '', '现价': '', '市值': cash,
      '盈亏': '', '盈亏%': '', '当日盈亏': '', '当日盈亏%': '',
      '占比%': totalAssets > 0 ? Math.round(cash / totalAssets * 10000) / 100 : 0,
      '目标%': cashTargetPct || '', '空头占比%': '', '板块': ''
    });
    rows.push(cashRow);
    return rows;
  }

  // "全部账户" sheet
  const allHoldings = [];
  let allCash = 0;
  data.accounts.forEach(a => {
    (a.holdings || []).forEach(h => allHoldings.push({ ...h, _accountName: a.name }));
    allCash += (a.cash || 0);
  });
  const allVal = allHoldings.reduce((s,h) => s + h.shares * (h.currentPrice || h.costPerShare), 0);
  const allTotal = allVal + allCash;
  const allRows = buildRows(allHoldings, allCash, null, allTotal, true);
  const allWs = XLSX.utils.json_to_sheet(allRows);
  allWs['!cols'] = colWidths;
  XLSX.utils.book_append_sheet(wb, allWs, '全部账户');

  // Per-account sheets
  data.accounts.forEach(account => {
    const holdings = account.holdings || [];
    const cash = account.cash || 0;
    const totalVal = holdings.reduce((s,h) => s + h.shares * (h.currentPrice || h.costPerShare), 0);
    const totalAssets = totalVal + cash;
    const rows = buildRows(holdings, cash, account.cashTargetPct, totalAssets, false);
    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = colWidths.filter((_, i) => i !== 2); // skip 账户 column
    XLSX.utils.book_append_sheet(wb, ws, account.name);
  });

  XLSX.writeFile(wb, `portfolio_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (imported.accounts) {
        data = imported;
        if (!data.history) data.history = {};
        if (!data.activeAccountId && data.accounts.length > 0) data.activeAccountId = data.accounts[0].id;
        saveData(data);
        renderAll();
        showToast('导入成功', 'success');
      } else {
        showToast('无效的数据文件', 'error');
      }
    } catch(e) {
      showToast('文件解析失败', 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ==================== Utilities ====================
function fmt(n) {
  return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 3000);
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', (e) => { if (e.target === m) m.classList.remove('show'); });
});

// ==================== Initialize ====================
initData();
</script>
